name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
      - gpuOptim
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install doc dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocstrings[python]
          # Install stubs for packages that may not be importable in CI
          pip install numpy scipy matplotlib || true
          # Install qiskit stubs so mkdocstrings can parse type annotations
          pip install qiskit qiskit-aer || true

      - name: Build and deploy docs
        run: mkdocs gh-deploy --force
